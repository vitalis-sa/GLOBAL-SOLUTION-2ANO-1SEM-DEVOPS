services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    environment:
      ORACLE_PASSWORD: ${ORACLE_PWD}
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -S system/$${ORACLE_PASSWORD}@localhost:1521/XEPDB1 > /dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 360s
  app:
    build: .
    container_name: java-app
    restart: unless-stopped
    depends_on:
      oracle-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${SPRING_DB_URL}
      DB_USER: ${APP_DB_USER}
      DB_PASSWORD: ${ORACLE_PWD}
      SHOW_SQL: ${SPRING_SHOW_SQL:-true}
      DB_DDL_AUTO: ${SPRING_DDL_AUTO:-update}
      DB_POOL_MAX: ${SPRING_POOL_MAX:-10}
      DB_POOL_MIN: ${SPRING_POOL_MIN:-2}

volumes:
  oracle-data: